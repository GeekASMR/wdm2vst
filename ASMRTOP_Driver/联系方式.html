<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>造音工坊 - 联系方式与激活码获取</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #FF8C00;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .warning-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .warning-title {
            color: #dc3545;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .warning-text {
            color: #333;
            line-height: 1.8;
            text-align: left;
        }
        
        .contact-box {
            background: #d4edda;
            border: 2px solid #28a745;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .contact-title {
            color: #28a745;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .wechat-id {
            font-size: 28px;
            font-weight: bold;
            color: #07C160;
            margin: 15px 0;
            letter-spacing: 2px;
        }
        
        .qr-code {
            margin: 20px 0;
        }
        
        .qr-code img {
            max-width: 250px;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #666;
        }
        
        .footer-logo {
            font-size: 24px;
            font-weight: bold;
            color: #FF8C00;
            margin-top: 10px;
        }
        
        .highlight {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎵 造音工坊 ZYGF STUDIO</div>
        <div class="subtitle">ZYGF Audio Driver - 专业虚拟音频驱动</div>
        
        <div class="warning-box">
            <div class="warning-title">⚠️ 重要声明</div>
            <div class="warning-text">
                ✓ 本软件已获得<span class="highlight">中华人民共和国软件著作权法保护</span><br>
                ✓ <span class="highlight">严禁破解、盗版或非法传播</span><br>
                ✓ 违者将承担法律责任，<span class="highlight">天涯海角也要追究到底</span>！
            </div>
        </div>
        
        <div class="contact-box">
            <div class="contact-title">📱 获取正版激活码</div>
            <p style="margin-bottom: 10px;">请添加微信联系我们：</p>
            <div class="wechat-id">wgxstudio</div>
            
            <div class="qr-code">
                <p style="margin-bottom: 10px; color: #666;">扫描二维码添加微信</p>
                <img src="wechat-qr.jpg" alt="微信二维码" onerror="this.style.display='none'; document.getElementById('qr-error').style.display='block';">
                <div id="qr-error" style="display:none; color: #dc3545; padding: 20px;">
                    二维码图片未找到，请查看安装目录中的 wechat-qr.jpg 文件
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>感谢您选择造音工坊的产品</p>
            <p style="margin-top: 5px; font-size: 12px;">驱动已安装6个虚拟音频设备，VST3插件已自动部署</p>
            <div class="footer-logo">━━━  造音工坊出品  ━━━</div>
        </div>
    </div>
</body>
</html>
